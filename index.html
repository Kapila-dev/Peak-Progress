function pain(){

 let vals=Object.entries(P).filter(x=>x[0]!='note'),max=Math.max(...vals.map(x=>+x[1]||0)),hot=vals.filter(x=>(+x[1]||0)>=3).map(x=>x[0]);
 let label=max>=4?'Stop / modify':max>=3?'Modify':max>=1?'Monitor':'Clear',cls=max>=4?'bad':max>=3?'warn':'ok';
 let affected=S.w.filter(e=>painHits(e,hot));
 return H('Pain & Movement Guard','Modify risky movements')+`<div class=card><div class=row><div><div class=muted>Highest pain flag</div><div class=big>${max}/5</div></div><span class="pill ${cls}">${label}</span></div><p class=muted>${max>=4?'Avoid loading painful patterns today. Replace or skip affected movements.':max>=3?'Modify range, load, or exercise selection before training hard.':max>=1?'Warm up carefully and monitor pain changes.':'No pain flags logged.'}</p></div><div class=card><b>Joint check</b>${vals.map(([k,v])=>`<div><div class=row><span>${k}</span><b>${v}/5</b></div><div class=tabs>${[0,1,2,3,4,5].map(n=>`<button class="${+v==n?'sel':''}" onclick="S.pain=S.pain||{};S.pain['${k}']=${n};R()">${n}</button>`).join('')}</div></div>`).join('')}</div><div class=card><b>Affected workout exercises</b>${affected.length?affected.map(e=>`<button class=link onclick="sel='${e.id}';go('detail')">${e.name}<span>${e.muscle}</span></button>`).join(''):'<p class=muted>No current exercises are flagged by pain inputs.</p>'}${affected.length?'<br><button class="btn" onclick="autoPainSwap()">Auto-swap flagged exercises</button>':''}</div><div class=card><b>Notes</b><textarea onchange="S.pain=S.pain||{};S.pain.note=this.value;save()">${P.note||''}</textarea></div>`
}
function painHits(e,hot){

 return hot.some(j=>(map[j]||[]).includes(e.muscle)||(e.secondary||[]).some(m=>(map[j]||[]).includes(m)))
}
function autoPainSwap(){
 let P=S.pain||{},hot=Object.entries(P).filter(x=>x[0]!='note'&&(+x[1]||0)>=3).map(x=>x[0]);
 S.w=S.w.map(e=>{
   if(!painHits(e,hot))return e;
   let alt=bank.find(x=>x.id!=e.id&&!painHits(x,hot)&&x.muscle==e.muscle)||bank.find(x=>x.id!=e.id&&!painHits(x,hot));
   if(!alt)return e;
   let n=make([alt.id])[0];n.sets=n.sets.slice(0,e.sets.length);return n;
 });

}

  Legs:['Brace before each rep.','Control the bottom position.','Keep knees tracking comfortably with the foot.','Do not sacrifice depth consistency for load.'],
  Core:['Brace like you are about to be punched.','Keep ribs stacked over pelvis.','Stop when the low back takes over.','Progress duration or leverage before load.']
 };
 let pattern=(e.muscle=='Chest'||e.muscle=='Triceps'||e.muscle=='Shoulders')?'Push':(e.muscle=='Back'||e.muscle=='Biceps'||e.muscle=='Forearms'||e.muscle=='Traps')?'Pull':e.muscle=='Legs'?'Lower':'Core';
 let type=e.equip=='Bodyweight'?'Bodyweight':e.equip=='Barbell'?'Heavy loading':e.equip=='Dumbbells'?'Free weights':e.equip=='Cable'||e.equip=='Machine'?'Guided resistance':'General';
 let setup={Push:'Stack wrist, elbow, and shoulder as much as the exercise allows.',Pull:'Set the torso first, then pull with control.',Lower:'Brace, find foot pressure, and keep reps repeatable.',Core:'Own the position before adding reps or time.'};
 let mistake={Push:'Do not let ego load turn the rep into shoulder irritation.',Pull:'Do not jerk the first inch of the rep.',Lower:'Do not let the last reps become a different movement.',Core:'Do not keep counting reps after the brace is gone.'};
 return {pattern,type,setup:setup[pattern],mistake:mistake[pattern],cues:cues[e.muscle]||['Move with control.','Keep the target muscle honest.','Stay inside a pain-free range.']}
}
